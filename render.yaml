# Render Blueprint (im Repo-Root) – New → Blueprint → dieses Repository
services:
  - type: web
    name: the-bus-tracker-api
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_DIR
        value: /opt/render/project/src/data
